name: Windows Temporary Workstation ARM64

on:
  workflow_dispatch:

jobs:

  workstation:

    runs-on: windows-11-arm

    timeout-minutes: 355

    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}


    steps:


    - name: Checkout repository

      uses: actions/checkout@v4


    - name: Verify ARM64 environment

      shell: powershell

      run: |
        Write-Host "=============================="
        Write-Host "System Architecture"
        Write-Host "=============================="

        Write-Host "Processor:"
        echo $env:PROCESSOR_ARCHITECTURE

        Write-Host "OS Architecture:"
        (Get-CimInstance Win32_OperatingSystem).OSArchitecture

        Write-Host "Windows Version:"
        Get-ComputerInfo | Select-Object WindowsProductName


    - name: Install rclone

      shell: powershell

      run: |
        .\scripts\install-rclone.ps1


    - name: Configure OCI

      shell: powershell

      run: |
        .\scripts\configure-oci.ps1


    - name: Prepare workspace

      shell: powershell

      run: |
        .\scripts\install.ps1


    - name: Restore workspace

      shell: powershell

      run: |
        .\scripts\restore.ps1


    - name: Enable RDP

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "Enabling Remote Desktop"
        Write-Host "=============================="


        # Enable RDP
        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        # Enable firewall rules
        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"


        # Disable NLA (better compatibility for temporary runners)
        Set-ItemProperty `
          -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
          -Name "UserAuthentication" `
          -Value 0


        # Restart RDP service
        Restart-Service TermService -Force


        Write-Host "RDP enabled"



    - name: Create RDP user

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}

        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}


      run: |

        Write-Host "=============================="
        Write-Host "Creating RDP User"
        Write-Host "=============================="


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force


        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

            Remove-LocalUser `
              -Name $env:RDP_USERNAME

        }


        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires



        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME



        Add-LocalGroupMember `
          -Group "Remote Desktop Users" `
          -Member $env:RDP_USERNAME



        Write-Host "User created"



    - name: Verify RDP

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "Checking RDP"
        Write-Host "=============================="


        Get-Service TermService


        netstat -ano | findstr :3389


        qwinsta



    - name: Install Tailscale ARM64

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "Installing Tailscale ARM64"
        Write-Host "=============================="


        $folder="C:\Tools\Tailscale"


        New-Item `
          -ItemType Directory `
          -Force `
          -Path $folder | Out-Null



        Invoke-WebRequest `
          -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.8-arm64.msi" `
          -OutFile "$folder\tailscale.msi"



        Start-Process `
          msiexec.exe `
          -ArgumentList "/i $folder\tailscale.msi /quiet /norestart" `
          -Wait



        Start-Sleep -Seconds 15



        Start-Service Tailscale



        Write-Host "Tailscale installed"



    - name: Connect Tailscale

      shell: powershell

      env:

        TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}


      run: |

        Write-Host "=============================="
        Write-Host "Connecting Tailscale"
        Write-Host "=============================="


        $tailscale="C:\Program Files\Tailscale\tailscale.exe"



        # Wait for daemon

        for ($i=0; $i -lt 30; $i++) {


            $health=& $tailscale health 2>&1


            Write-Host $health


            if ($health -notmatch "starting") {

                break

            }


            Start-Sleep -Seconds 5

        }



        & $tailscale up `
          --authkey="$env:TAILSCALE_AUTH_KEY" `
          --hostname="github-win11-arm64" `
          --accept-routes



        Start-Sleep -Seconds 20



        Write-Host "Tailscale status"

        & $tailscale status



        Write-Host "Tailscale IP"

        & $tailscale ip -4



    - name: Final network check

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "FINAL CHECK"
        Write-Host "=============================="


        Write-Host "IP addresses"

        ipconfig



        Write-Host "RDP Port"

        netstat -ano | findstr :3389



        Write-Host "Tailscale"

        & "C:\Program Files\Tailscale\tailscale.exe" status




    - name: Start autosave

      shell: powershell

      run: |


        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden



    - name: Work session

      shell: powershell

      run: |


        Write-Host "================================"
        Write-Host "Windows ARM64 workstation ready"
        Write-Host "Connect using Tailscale IP"
        Write-Host "================================"



        while ($true) {

          Start-Sleep -Seconds 300

        }



    - name: Final backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
