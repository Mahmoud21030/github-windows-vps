name: Windows Temporary Workstation ARM64

on:
  workflow_dispatch:

jobs:

  workstation:

    runs-on: windows-11-vs2026-arm

    timeout-minutes: 355

    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}


    steps:


    - name: Checkout repository

      uses: actions/checkout@v4


    - name: Verify ARM64 environment

      shell: powershell

      run: |
        Write-Host "=============================="
        Write-Host "System Architecture"
        Write-Host "=============================="

        Write-Host "Processor:"
        echo $env:PROCESSOR_ARCHITECTURE

        Write-Host "OS Architecture:"
        (Get-CimInstance Win32_OperatingSystem).OSArchitecture

        Write-Host "Windows Version:"
        Get-ComputerInfo | Select-Object WindowsProductName


    - name: Install rclone

      shell: powershell

      run: |
        .\scripts\install-rclone.ps1


    - name: Configure OCI

      shell: powershell

      run: |
        .\scripts\configure-oci.ps1


    - name: Prepare workspace

      shell: powershell

      run: |
        .\scripts\install.ps1


    - name: Restore workspace

      shell: powershell

      run: |
        .\scripts\restore.ps1


    - name: Enable RDP

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "Enabling Remote Desktop"
        Write-Host "=============================="


        # Enable RDP
        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        # Enable firewall rules
        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"


        # Disable NLA (better compatibility for temporary runners)
        Set-ItemProperty `
          -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
          -Name "UserAuthentication" `
          -Value 0


        # Restart RDP service
        Restart-Service TermService -Force


        Write-Host "RDP enabled"



    - name: Create RDP user

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}

        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}


      run: |

        Write-Host "=============================="
        Write-Host "Creating RDP User"
        Write-Host "=============================="


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force


        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

            Remove-LocalUser `
              -Name $env:RDP_USERNAME

        }


        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires



        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME



        Add-LocalGroupMember `
          -Group "Remote Desktop Users" `
          -Member $env:RDP_USERNAME



        Write-Host "User created"



    - name: Verify RDP

      shell: powershell

      run: |

        Write-Host "=============================="
        Write-Host "Checking RDP"
        Write-Host "=============================="


        Get-Service TermService


        netstat -ano | findstr :3389


        qwinsta


    - name: Install OpenSSH Client

      shell: powershell

      run: |

        Write-Host "Checking SSH..."

        ssh -V


    - name: Start Serveo RDP Tunnel

      shell: powershell

      run: |

        Write-Host "================================="
        Write-Host "Starting Serveo RDP tunnel"
        Write-Host "================================="


        # Disable strict host checking for automation

        $sshOptions = @(
          "-o", "StrictHostKeyChecking=no",
          "-o", "UserKnownHostsFile=NUL",
          "-o", "ServerAliveInterval=30",
          "-o", "ServerAliveCountMax=3",
          "-R", "7970:localhost:3389",
          "serveo.net"
        )


        Start-Process `
          -FilePath "ssh.exe" `
          -ArgumentList $sshOptions `
          -RedirectStandardOutput "C:\serveo.log" `
          -RedirectStandardError "C:\serveo-error.log" `
          -WindowStyle Hidden



        Start-Sleep -Seconds 20



        Write-Host "========== SERVEO OUTPUT =========="

        if (Test-Path C:\serveo.log) {
            Get-Content C:\serveo.log
        }


        Write-Host "========== SERVEO ERROR =========="

        if (Test-Path C:\serveo-error.log) {
            Get-Content C:\serveo-error.log
        }
        
   



    - name: Start autosave

      shell: powershell

      run: |


        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden



    - name: Work session

      shell: powershell

      run: |


        Write-Host "================================"
        Write-Host "Windows ARM64 workstation ready"
        Write-Host "Connect using Tailscale IP"
        Write-Host "================================"



        while ($true) {

          Start-Sleep -Seconds 300

        }



    - name: Final backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
