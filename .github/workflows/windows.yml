name: Windows Temporary Workstation

on:

  workflow_dispatch:


jobs:

  workstation:

    runs-on: windows-11-arm

    timeout-minutes: 355


    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}



    steps:


    - name: Checkout repository

      uses: actions/checkout@v4



    - name: Install rclone

      shell: powershell

      run: |

        .\scripts\install-rclone.ps1



    - name: Configure OCI

      shell: powershell

      run: |

        .\scripts\configure-oci.ps1



    - name: Prepare workspace

      shell: powershell

      run: |

        .\scripts\install.ps1



    - name: Restore workspace

      shell: powershell

      run: |

        .\scripts\restore.ps1



    - name: Enable RDP

      shell: powershell

      run: |

        Write-Host "Enabling Remote Desktop."


        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"



    - name: Create RDP user

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}

        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      run: |

        Write-Host "Creating RDP user."


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force


        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

          Remove-LocalUser `
            -Name $env:RDP_USERNAME

        }


        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires


        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME



    - name: Install Tailscale

      shell: powershell

      run: |

        Write-Host "Installing Tailscale."


        $folder = "C:\Tools\Tailscale"

        New-Item -ItemType Directory -Force -Path $folder | Out-Null
        
        Invoke-WebRequest `
          -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.8-arm64.msi" `
          -OutFile "$folder\tailscale.msi"
        
        
        Start-Process msiexec.exe `
          -ArgumentList "/i $folder\tailscale.msi /quiet" `
          -Wait
        
        
        Start-Sleep -Seconds 15
        
        
        $service = Get-Service Tailscale
        
        if ($service.Status -ne "Running") {
            Start-Service Tailscale
            Start-Sleep -Seconds 10
        }
        
        
        & "C:\Program Files\Tailscale\tailscale.exe" status



        Write-Host "Tailscale installed."



    - name: Connect Tailscale
      shell: powershell
      env:
        TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

      run: |

        $tailscale = "C:\Program Files\Tailscale\tailscale.exe"

        Write-Host "Checking Tailscale service..."

        $service = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue

        if ($null -eq $service) {
            throw "Tailscale service not installed."
        }


        if ($service.Status -ne "Running") {

            Start-Service Tailscale

            Start-Sleep -Seconds 15

        }


        Write-Host "Starting Tailscale login..."


        & $tailscale up `
          --authkey=$env:TAILSCALE_AUTH_KEY `
          --hostname=github-windows-arm `
          --accept-dns=true


        Write-Host "Waiting for Tailscale IP..."


        $timeout = 60

        while ($timeout -gt 0) {

            $ip = & $tailscale ip 2>$null

            if ($ip) {

                Write-Host "Tailscale IP:"
                Write-Host $ip
                exit 0

            }


            Start-Sleep -Seconds 5

            $timeout -= 5

        }


        Write-Host "Tailscale status:"
        & $tailscale status


        throw "Tailscale failed to obtain IP."


    - name: Show Tailscale IP

      shell: powershell

      run: |

        $tailscale = "C:\Program Files\Tailscale\tailscale.exe"


        Write-Host "RDP address:"


        & $tailscale ip



    - name: Start autosave

      shell: powershell

      run: |

        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden



    - name: Work session

      shell: powershell

      run: |

        Write-Host "Windows workstation is ready."

        Write-Host "Connect using the Tailscale IP."


        while ($true) {

          Start-Sleep `
            -Seconds 300

        }



    - name: Final backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
