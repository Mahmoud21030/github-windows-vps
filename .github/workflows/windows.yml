name: Oracle Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=~/.oci/oci_api_key.pem
          EOF

      - name: List Buckets
        env:
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          oci os bucket list \
                         --namespace-name "$OCI_NAMESPACE" \
                         --compartment-id "$OCI_COMPARTMENT_OCID"

      - name: Download latest backup
        shell: pwsh
        env:
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          OCI_BUCKET: ${{ secrets.OCI_BUCKET }}
        run: |
          New-Item -ItemType Directory -Force -Path C:\Workspace
      
          $exists = oci os object head `
            --namespace-name "$env:OCI_NAMESPACE" `
            --bucket-name "$env:OCI_BUCKET" `
            --name backup.zip 2>$null
      
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Backup found."
      
            oci os object get `
              --namespace-name "$env:OCI_NAMESPACE" `
              --bucket-name "$env:OCI_BUCKET" `
              --name backup.zip `
              --file C:\backup.zip
      
            Expand-Archive C:\backup.zip C:\Workspace -Force
          }
          else {
            Write-Host "No backup exists."
          }

          - name: Upload backup
            shell: pwsh
            env:
              OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
              OCI_BUCKET: ${{ secrets.OCI_BUCKET }}
            run: |
              Compress-Archive `
                -Path C:\Workspace\* `
                -DestinationPath C:\backup.zip `
                -Force
          
              oci os object put `
                --namespace-name "$env:OCI_NAMESPACE" `
                --bucket-name "$env:OCI_BUCKET" `
                --name backup.zip `
                --file C:\backup.zip `
                --force
