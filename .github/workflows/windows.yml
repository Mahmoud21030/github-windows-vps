name: Windows Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: windows-2022
    timeout-minutes: 355

    env:
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}

    steps:

      - uses: actions/checkout@v4

      - name: Create Workspace
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "C:\Workspace"

      - name: Install OCI CLI
        shell: pwsh
        run: |
          Invoke-WebRequest `
            https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.ps1 `
            -OutFile install.ps1

          powershell -ExecutionPolicy Bypass -File install.ps1

      - name: Configure OCI
        shell: pwsh
        run: |

          New-Item `
            -ItemType Directory `
            -Force `
            -Path "$env:USERPROFILE\.oci"

          $env:OCI_PRIVATE_KEY |
          Out-File `
          "$env:USERPROFILE\.oci\oci_api_key.pem" `
          -Encoding ascii

          @"
          [DEFAULT]
          user=$env:OCI_USER_OCID
          fingerprint=$env:OCI_FINGERPRINT
          tenancy=$env:OCI_TENANCY_OCID
          region=$env:OCI_REGION
          key_file=$env:USERPROFILE\.oci\oci_api_key.pem
          "@ |
          Out-File `
          "$env:USERPROFILE\.oci\config" `
          -Encoding ascii

      - name: Restore Backup
        shell: pwsh
        run: |

          $exists=$false

          try{
            oci os object head `
            --namespace-name $env:OCI_NAMESPACE `
            --bucket-name $env:OCI_BUCKET `
            --name backup.zip

            $exists=$true
          }
          catch{
            Write-Host "No Backup Found"
          }

          if($exists){

            oci os object get `
            --namespace-name $env:OCI_NAMESPACE `
            --bucket-name $env:OCI_BUCKET `
            --name backup.zip `
            --file C:\backup.zip

            Expand-Archive `
            C:\backup.zip `
            C:\Workspace `
            -Force

          }

      - name: Wait For User Work
        shell: pwsh
        run: |

          Write-Host "Start working..."

          Start-Sleep -Seconds 300

      - name: Create Backup
        shell: pwsh
        run: |

          Compress-Archive `
          C:\Workspace\* `
          C:\backup.zip `
          -Force

      - name: Upload Backup
        shell: pwsh
        run: |

          oci os object put `
          --namespace-name $env:OCI_NAMESPACE `
          --bucket-name $env:OCI_BUCKET `
          --name backup.zip `
          --file C:\backup.zip `
          --force
