name: Windows Temporary Workstation

on:
  workflow_dispatch:


jobs:

  workstation:

    runs-on: windows-11-arm

    timeout-minutes: 355


    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}



    steps:


    - name: Checkout repository
      uses: actions/checkout@v4



    - name: Install rclone
      shell: powershell
      run: |

        .\scripts\install-rclone.ps1



    - name: Configure OCI
      shell: powershell
      run: |

        .\scripts\configure-oci.ps1



    - name: Prepare workspace
      shell: powershell
      run: |

        .\scripts\install.ps1



    - name: Restore workspace
      shell: powershell
      run: |

        .\scripts\restore.ps1



    - name: Enable RDP
      shell: powershell
      run: |

        Write-Host "Enabling Remote Desktop"


        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"



    - name: Create RDP user

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}
        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}


      run: |

        Write-Host "Creating RDP user"


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force



        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

            Remove-LocalUser `
              -Name $env:RDP_USERNAME

        }



        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires



        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME




    - name: Check OpenSSH

      shell: powershell

      run: |

        Write-Host "Checking SSH"

        ssh -V





    - name: Start Pinggy RDP Tunnel

      shell: powershell

      run: |


        Write-Host "Starting Pinggy SSH reverse tunnel"



        Remove-Item `
          C:\pinggy.log `
          -ErrorAction SilentlyContinue



        Remove-Item `
          C:\pinggy-error.log `
          -ErrorAction SilentlyContinue




        Start-Process `
          -FilePath "ssh.exe" `
          -ArgumentList "-tt -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ExitOnForwardFailure=yes -p 443 -R0:localhost:3389 a.pinggy.io" `
          -RedirectStandardOutput "C:\pinggy.log" `
          -RedirectStandardError "C:\pinggy-error.log" `
          -WindowStyle Hidden




        Start-Sleep -Seconds 30




        Write-Host ""
        Write-Host "==============================="
        Write-Host "PINGGY OUTPUT"
        Write-Host "==============================="



        if (Test-Path C:\pinggy.log) {

            Get-Content C:\pinggy.log

        }




        Write-Host ""
        Write-Host "==============================="
        Write-Host "PINGGY ERRORS"
        Write-Host "==============================="



        if (Test-Path C:\pinggy-error.log) {

            Get-Content C:\pinggy-error.log

        }





    - name: Verify RDP service

      shell: powershell

      run: |


        Write-Host "Checking RDP"



        Get-Service TermService



        netstat -ano | findstr :3389





    - name: Start autosave

      shell: powershell

      run: |


        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden





    - name: Work session

      shell: powershell

      run: |


        Write-Host ""
        Write-Host "================================"
        Write-Host "Windows workstation is ready"
        Write-Host "Use Pinggy RDP address above"
        Write-Host "================================"
        Write-Host ""



        while ($true) {

            Start-Sleep -Seconds 300

        }





    - name: Final backup

      if: always()

      shell: powershell

      run: |


        .\scripts\finalize.ps1
