name: Windows Temporary Workstation ARM64

on:
  workflow_dispatch:

jobs:

  workstation:

    runs-on: windows-11-arm

    timeout-minutes: 355

    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}


    steps:


    - name: Checkout repository

      uses: actions/checkout@v4


    - name: Verify ARM64 environment

      shell: powershell

      run: |
        Write-Host "=============================="
        Write-Host "System Architecture"
        Write-Host "=============================="

        Write-Host "Processor:"
        echo $env:PROCESSOR_ARCHITECTURE

        Write-Host "OS Architecture:"
        (Get-CimInstance Win32_OperatingSystem).OSArchitecture

        Write-Host "Windows Version:"
        Get-ComputerInfo | Select-Object WindowsProductName


    - name: Install rclone

      shell: powershell

      run: |
        .\scripts\install-rclone.ps1


    - name: Configure OCI

      shell: powershell

      run: |
        .\scripts\configure-oci.ps1


    - name: Prepare workspace

      shell: powershell

      run: |
        .\scripts\install.ps1


    - name: Restore workspace

      shell: powershell

      run: |
        .\scripts\restore.ps1


    - name: Enable RDP

      shell: powershell

      run: |

        Write-Host "Enabling Remote Desktop."

        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"



    - name: Create RDP user

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}

        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}


      run: |

        Write-Host "Creating RDP user."


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force


        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

          Remove-LocalUser `
            -Name $env:RDP_USERNAME

        }


        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires


        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME



    - name: Install Tailscale ARM64

      shell: powershell

      run: |

        Write-Host "Installing Tailscale ARM64."


        $folder = "C:\Tools\Tailscale"


        New-Item `
          -ItemType Directory `
          -Force `
          -Path $folder | Out-Null


        Invoke-WebRequest `
          -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.8-arm64.msi" `
          -OutFile "$folder\tailscale-arm64.msi"



        Start-Process `
          msiexec.exe `
          -ArgumentList "/i $folder\tailscale-arm64.msi /quiet /norestart" `
          -Wait



        Start-Sleep -Seconds 10



        if (!(Test-Path "C:\Program Files\Tailscale\tailscale.exe")) {

          throw "Tailscale ARM64 installation failed."

        }


        Write-Host "Tailscale ARM64 installed."



    - name: Connect Tailscale

      shell: powershell

      env:

        TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}


      run: |


        Write-Host "Connecting Tailscale."


        $tailscale = "C:\Program Files\Tailscale\tailscale.exe"



        if (!(Test-Path $tailscale)) {

          throw "tailscale.exe not found."

        }



        & $tailscale up `
          --authkey=$env:TAILSCALE_AUTH_KEY `
          --hostname github-windows-arm64

    - name: Debug Tailscale
      shell: powershell
      run: |
        Get-Service Tailscale | Format-List *
    
        sc.exe query Tailscale
    
        & "C:\Program Files\Tailscale\tailscale.exe" version
    
        & "C:\Program Files\Tailscale\tailscale.exe" status
    
        & "C:\Program Files\Tailscale\tailscale.exe" debug daemon-logs

    - name: Show Tailscale IP

      shell: powershell

      run: |


        $tailscale = "C:\Program Files\Tailscale\tailscale.exe"



        Write-Host "================================"
        Write-Host "RDP ADDRESS"
        Write-Host "================================"



        & $tailscale ip



    - name: Start autosave

      shell: powershell

      run: |


        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden



    - name: Work session

      shell: powershell

      run: |


        Write-Host "================================"
        Write-Host "Windows ARM64 workstation ready"
        Write-Host "Connect using Tailscale IP"
        Write-Host "================================"



        while ($true) {

          Start-Sleep -Seconds 300

        }



    - name: Final backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
