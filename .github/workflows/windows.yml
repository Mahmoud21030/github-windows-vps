name: Windows Workspace

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    runs-on: windows-2022
    timeout-minutes: 355

    env:
      WORKSPACE_DIR: C:\Workspace
      LOG_DIR: C:\Workspace\logs
      OCI_CONFIG_FILE: C:\Workspace\config\oci_config
      RCLONE_CONFIG: C:\Workspace\config\rclone.conf

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Workspace
        run: |
          New-Item -ItemType Directory -Force -Path $env:WORKSPACE_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:WORKSPACE_DIR\config" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:WORKSPACE_DIR\logs" | Out-Null

      - name: Install rclone
        run: |
          .\scripts\install-rclone.ps1

      - name: Configure Oracle Cloud
        run: |
          .\scripts\configure-oci.ps1

      - name: Restore Workspace
        run: |
          .\scripts\restore.ps1

      - name: Start Autosave
        run: |
          Start-Process powershell `
            -ArgumentList "-ExecutionPolicy Bypass -File `"$PWD\scripts\autosave.ps1`"" `
            -WindowStyle Hidden

      - name: Prepare Environment
        run: |
          .\scripts\install.ps1

      - name: Workspace Ready
        run: |
          Write-Host ""
          Write-Host "==============================================="
          Write-Host " Workspace restored to:"
          Write-Host " $env:WORKSPACE_DIR"
          Write-Host ""
          Write-Host " Autosave is running every 10 minutes."
          Write-Host "==============================================="
          Write-Host ""

      #
      # ----------------------------------------------------
      # Add your own build/test/workstation commands here.
      # Everything inside C:\Workspace will be preserved.
      # ----------------------------------------------------
      #

      - name: Final Backup
        if: always()
        run: |
          .\scripts\finalize.ps1
