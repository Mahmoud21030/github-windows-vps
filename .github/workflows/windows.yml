name: Windows Workspace

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:

    runs-on: windows-2022
    timeout-minutes: 355

    defaults:
      run:
        shell: powershell

    env:
      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Create workspace
      run: |

        New-Item `
            -ItemType Directory `
            -Force `
            -Path C:\Workspace | Out-Null

        New-Item `
            -ItemType Directory `
            -Force `
            -Path C:\Workspace\config | Out-Null

        New-Item `
            -ItemType Directory `
            -Force `
            -Path C:\Workspace\logs | Out-Null

        New-Item `
            -ItemType Directory `
            -Force `
            -Path C:\Tools | Out-Null

    - name: Install rclone
      run: |
        .\scripts\install-rclone.ps1

    - name: Verify rclone
      run: |

        if (!(Test-Path "C:\Tools\rclone\rclone.exe")) {

            throw "rclone installation failed."
        }

        & "C:\Tools\rclone\rclone.exe" version

    - name: Configure OCI
      run: |
        .\scripts\configure-oci.ps1

    - name: Verify OCI
      run: |

        & "C:\Tools\rclone\rclone.exe" `
            listremotes `
            --config C:\Workspace\config\rclone.conf

    - name: Restore workspace
      run: |
        .\scripts\restore.ps1

    - name: Start autosave
      run: |

        $job = Start-Job `
            -ScriptBlock {

                param($repo)

                Set-Location $repo

                powershell `
                    -ExecutionPolicy Bypass `
                    -File ".\scripts\autosave.ps1"

            } `
            -ArgumentList $PWD

        $job.Id

    - name: Install tools
      run: |
        .\scripts\install.ps1

    - name: Workspace ready
      run: |

        Write-Host ""
        Write-Host "==================================="
        Write-Host "Workspace:"
        Write-Host "C:\Workspace"
        Write-Host ""
        Write-Host "Autosave running every 10 minutes."
        Write-Host "==================================="

    #################################################################
    # Put your own commands below.
    #
    # Everything inside C:\Workspace will be restored next run.
    #################################################################

    #- name: Example
    #  run: |
    #      Copy-Item something C:\Workspace

    - name: Final backup
      if: always()
      run: |
        .\scripts\finalize.ps1
