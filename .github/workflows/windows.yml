name: Windows Temporary Workstation

on:
  workflow_dispatch:


jobs:

  workstation:

    runs-on: windows-11-arm

    timeout-minutes: 355


    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}



    steps:


    - name: Checkout repository
      uses: actions/checkout@v4



    - name: Install rclone
      shell: powershell
      run: |
        .\scripts\install-rclone.ps1



    - name: Configure OCI
      shell: powershell
      run: |
        .\scripts\configure-oci.ps1



    - name: Prepare workspace
      shell: powershell
      run: |
        .\scripts\install.ps1



    - name: Restore workspace
      shell: powershell
      run: |
        .\scripts\restore.ps1



    - name: Enable RDP
      shell: powershell
      run: |

        Write-Host "Enabling RDP"


        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"


        Set-Service `
          -Name TermService `
          -StartupType Automatic


        # Restart-Service TermService



    - name: Create RDP User

      shell: powershell

      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}
        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}


      run: |

        Write-Host "Creating RDP user"


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force



        if (Get-LocalUser `
            -Name $env:RDP_USERNAME `
            -ErrorAction SilentlyContinue) {


            Remove-LocalUser `
              -Name $env:RDP_USERNAME

        }



        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires



        Add-LocalGroupMember `
          -Group Administrators `
          -Member $env:RDP_USERNAME




    - name: Verify RDP

      shell: powershell

      run: |


        Get-Service TermService


        netstat -ano | findstr :3389





    - name: Start Serveo RDP Tunnel
      shell: powershell
      run: |

        Write-Host "================================"
        Write-Host "Starting Serveo SSH RDP Tunnel"
        Write-Host "================================"


        Remove-Item C:\serveo.log `
          -Force `
          -ErrorAction SilentlyContinue


        Remove-Item C:\serveo-error.log `
          -Force `
          -ErrorAction SilentlyContinue



        Start-Process `
          -FilePath "ssh.exe" `
          -ArgumentList @(
              "-o",
              "StrictHostKeyChecking=no",
              "-o",
              "ServerAliveInterval=30",
              "-R",
              "0:localhost:3389",
              "serveo.net"
          ) `
          -RedirectStandardOutput C:\serveo.log `
          -RedirectStandardError C:\serveo-error.log `
          -WindowStyle Hidden



        Start-Sleep -Seconds 30



        Write-Host ""
        Write-Host "========== SERVEO OUTPUT =========="


        if (Test-Path C:\serveo.log) {

            Get-Content C:\serveo.log

        }



        Write-Host ""
        Write-Host "========== SERVEO ERROR =========="


        if (Test-Path C:\serveo-error.log) {

            Get-Content C:\serveo-error.log

        }

    - name: Start Autosave

      shell: powershell

      run: |


        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden





    - name: Work Session

      shell: powershell

      run: |


        Write-Host ""
        Write-Host "===================================="
        Write-Host "WINDOWS WORKSTATION READY"
        Write-Host "Use Pinggy RDP address from logs"
        Write-Host "===================================="



        while ($true) {

            Start-Sleep -Seconds 300

        }





    - name: Final Backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
