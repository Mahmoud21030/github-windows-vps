name: Windows Temporary Workstation

on:
  workflow_dispatch:


jobs:

  workstation:

    runs-on: windows-2022

    timeout-minutes: 355


    env:

      WORKSPACE: C:\Workspace

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_BUCKET: ${{ secrets.OCI_BUCKET }}



    steps:


    - name: Checkout repository

      uses: actions/checkout@v4



    - name: Install rclone

      shell: powershell

      run: |

        .\scripts\install-rclone.ps1



    - name: Configure OCI

      shell: powershell

      run: |

        .\scripts\configure-oci.ps1



    - name: Prepare workstation

      shell: powershell

      run: |

        .\scripts\install.ps1



    - name: Restore workspace

      shell: powershell

      run: |

        .\scripts\restore.ps1



    - name: Start autosave

      shell: powershell

      run: |

        Start-Process powershell.exe `
          -ArgumentList "-ExecutionPolicy Bypass -File .\scripts\autosave.ps1" `
          -WindowStyle Hidden
          
    - name: Enable RDP
      shell: powershell
      run: |

        Write-Host "Enabling Remote Desktop."

        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0


        Enable-NetFirewallRule `
          -DisplayGroup "Remote Desktop"



    - name: Create RDP user
      shell: powershell
      env:

        RDP_USERNAME: ${{ secrets.RDP_USERNAME }}

        RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      run: |

        Write-Host "Creating RDP user."


        $password = ConvertTo-SecureString `
          $env:RDP_PASSWORD `
          -AsPlainText `
          -Force


        if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {

            Remove-LocalUser `
              -Name $env:RDP_USERNAME

        }


        New-LocalUser `
          -Name $env:RDP_USERNAME `
          -Password $password `
          -AccountNeverExpires


        Add-LocalGroupMember `
          -Group "Administrators" `
          -Member $env:RDP_USERNAME



    - name: Install cloudflared
      shell: powershell
      run: |

        Write-Host "Downloading cloudflared."


        $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"


        New-Item `
          -ItemType Directory `
          -Force `
          -Path "C:\Tools\cloudflared" | Out-Null


        Invoke-WebRequest `
          -Uri $url `
          -OutFile "C:\Tools\cloudflared\cloudflared.exe"



    - name: Start Cloudflare RDP tunnel
      shell: powershell
      env:

        CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

      run: |

        Write-Host "Starting Cloudflare tunnel."


        Start-Process `
          -FilePath "C:\Tools\cloudflared\cloudflared.exe" `
          -ArgumentList @(
              "tunnel",
              "--no-autoupdate",
              "run",
              "--token",
              $env:CLOUDFLARE_TUNNEL_TOKEN
          ) `
          -WindowStyle Hidden



        Start-Sleep -Seconds 15


        Write-Host "Cloudflare tunnel started."


    - name: Work session

      shell: powershell

      run: |

        Write-Host "Workspace ready."

        Write-Host "Add your commands here."



    - name: Final backup

      if: always()

      shell: powershell

      run: |

        .\scripts\finalize.ps1
